<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:var(--font-body);padding:24px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.sw{border-radius:6px;overflow:hidden;border:1px solid var(--td-border)}
.chip{height:84px}
.lbl{padding:10px 12px;font-size:11px}
.nm{font-weight:600;color:var(--td-text-primary)}
.hx{font-family:var(--font-mono);font-size:10px;color:var(--td-text-muted);margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#E57A3A"></div><div class="lbl"><div class="nm">Orange · Primary</div><div class="hx">#E57A3A · --td-orange</div></div></div>
  <div class="sw"><div class="chip" style="background:#C4622A"></div><div class="lbl"><div class="nm">Orange · Dark (hover)</div><div class="hx">#C4622A · --td-orange-dark</div></div></div>
  <div class="sw"><div class="chip" style="background:#F0A882"></div><div class="lbl"><div class="nm">Peach · Accent</div><div class="hx">#F0A882 · --td-orange-light</div></div></div>
  <div class="sw"><div class="chip" style="background:#222"></div><div class="lbl"><div class="nm">Charcoal · Darker</div><div class="hx">#222222 · --td-bg-darker</div></div></div>
  <div class="sw"><div class="chip" style="background:#434343"></div><div class="lbl"><div class="nm">Charcoal · Sidebar</div><div class="hx">#434343 · --td-bg-dark</div></div></div>
  <div class="sw"><div class="chip" style="background:#FFF;border-bottom:1px solid var(--td-border)"></div><div class="lbl"><div class="nm">White · Surface</div><div class="hx">#FFFFFF · --td-bg</div></div></div>
</div>
</body></html>
