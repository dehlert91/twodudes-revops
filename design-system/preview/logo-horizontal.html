<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:var(--font-body);padding:28px}
.wrap{display:flex;gap:28px;align-items:center}
.wrap img{height:64px}
.meta{font-size:12px;color:var(--td-text-secondary);line-height:1.6}
.u{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--td-text-muted);display:block;margin-bottom:4px}
</style></head><body>
<div class="wrap">
  <img src="../assets/logo-horizontal.png" alt="Two Dudes horizontal lockup">
  <div class="meta">
    <span class="u">Horizontal Lockup</span>
    <strong>Wordmark + Bus Medallion</strong><br>
    Use in headers, letterhead, web nav. This is a locked artwork asset — its internal color split is part of the logo, not a type rule.
  </div>
</div>
</body></html>
