<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:var(--font-body);padding:0;height:100%}
.wrap{display:flex;height:300px;border:1px solid var(--td-border);border-radius:8px;overflow:hidden;margin:20px}
.side{width:208px;background:#434343;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.logo{background:#fff;padding:14px 20px;display:flex;align-items:center}
.logo img{height:28px;width:auto;display:block}
.nav{padding:14px 0;flex:1}
.nav a{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:rgba(255,255,255,0.8);text-decoration:none;border-left:3px solid transparent}
.nav a:hover{color:#fff;background:rgba(255,255,255,0.04)}
.nav a.active{background:rgba(229,122,58,0.12);color:#F0A882;border-left-color:#E57A3A;font-weight:600}
.nav a svg{flex-shrink:0;opacity:0.9}
.foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,0.08);font-family:var(--font-mono);font-size:11px;color:rgba(255,255,255,0.55)}
.main{flex:1;padding:24px;background:#fff}
.eyebrow{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--td-text-muted)}
.h{font-family:var(--font-body);font-weight:700;font-size:24px;color:#000;margin-top:6px}
</style></head><body>
<div class="wrap">
  <aside class="side">
    <div class="logo"><img src="../assets/logo-horizontal.png" alt="Two Dudes"></div>
    <nav class="nav">
      <a><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 13h8V3H3v10zm10 8h8V11h-8v10zM3 21h8v-6H3v6zM13 3v6h8V3h-8z"/></svg>Revenue</a>
      <a><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="17" rx="2"/><path d="M3 10h18M8 2v4M16 2v4"/></svg>Schedule</a>
      <a class="active"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 7l9-4 9 4v10l-9 4-9-4V7z"/><path d="M3 7l9 4 9-4M12 11v10"/></svg>Projects</a>
      <a><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7H15a3.5 3.5 0 010 7H6"/></svg>Finance</a>
      <a><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 20h18M6 20V10M12 20V4M18 20v-7"/></svg>Benchmarks</a>
    </nav>
    <div class="foot">pete@twodudes.com</div>
  </aside>
  <main class="main">
    <div class="eyebrow">Ops · Projects</div>
    <div class="h">Projects Dashboard</div>
  </main>
</div>
</body></html>
