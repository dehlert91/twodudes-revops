<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:var(--font-body);padding:24px}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
.sw{border:1px solid var(--td-border);border-radius:6px;overflow:hidden}
.chip{height:56px}
.lbl{padding:8px 10px}
.nm{font-size:11px;font-weight:600;color:var(--td-text-primary)}
.hx{font-family:var(--font-mono);font-size:10px;color:var(--td-text-muted);margin-top:2px}
</style></head><body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:#4A8C5C"></div><div class="lbl"><div class="nm">Success</div><div class="hx">#4A8C5C</div></div></div>
  <div class="sw"><div class="chip" style="background:#E57A3A"></div><div class="lbl"><div class="nm">Warning</div><div class="hx">#E57A3A</div></div></div>
  <div class="sw"><div class="chip" style="background:#C0392B"></div><div class="lbl"><div class="nm">Error</div><div class="hx">#C0392B</div></div></div>
  <div class="sw"><div class="chip" style="background:#2980B9"></div><div class="lbl"><div class="nm">Info</div><div class="hx">#2980B9</div></div></div>
  <div class="sw"><div class="chip" style="background:#8E8E8E"></div><div class="lbl"><div class="nm">Neutral</div><div class="hx">#8E8E8E</div></div></div>
</div>
</body></html>
