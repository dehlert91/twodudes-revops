<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css"><style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#fff;font-family:var(--font-body);padding:28px;color:var(--td-text-primary)}
.group{display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap}
.lbl{font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--td-text-muted);width:90px}
.btn{font-family:var(--font-body);font-weight:600;font-size:15px;letter-spacing:0.02em;padding:10px 20px;border-radius:4px;border:none;cursor:pointer}
.btn-primary{background:var(--td-orange);color:#fff}
.btn-primary:hover{background:var(--td-orange-dark)}
.btn-secondary{background:transparent;color:var(--td-orange);border:1.5px solid var(--td-orange)}
.btn-ghost{background:transparent;color:var(--td-text-secondary);border:1px solid var(--td-border);font-weight:500;font-size:14px;padding:8px 16px}
.btn-destructive{background:var(--td-error);color:#fff}
.btn-sm{font-size:13px;padding:6px 12px}
.btn:disabled{opacity:0.5;cursor:not-allowed}
</style></head><body>
<div class="group"><span class="lbl">Primary</span>
  <button class="btn btn-primary">Save Changes</button>
  <button class="btn btn-primary btn-sm">Save</button>
  <button class="btn btn-primary" disabled>Disabled</button>
</div>
<div class="group"><span class="lbl">Secondary</span>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-secondary btn-sm">Edit</button>
</div>
<div class="group"><span class="lbl">Ghost</span>
  <button class="btn btn-ghost">More options</button>
  <button class="btn btn-ghost btn-sm">Filter</button>
</div>
<div class="group"><span class="lbl">Destructive</span>
  <button class="btn btn-destructive">Delete job</button>
</div>
</body></html>
